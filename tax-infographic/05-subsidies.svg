
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160">
  <rect x="0" y="0" width="3840" height="2160" fill="#0B1120"/>
  <defs>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="2160">
      <stop offset="0%" stop-color="#8B5CF615"/>
      <stop offset="100%" stop-color="#8B5CF600"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="3840" height="2160" fill="url(#g5)"/>
  
  <rect x="0" y="0" width="3840" height="80" fill="#111827" opacity="0.6"/>
  <text x="60" y="52" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#94A3B8" letter-spacing="4">TAX BREAKDOWN · INDIA 2026</text>
  <text x="3780" y="52" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#F59E0B" text-anchor="end">5/10</text>
  <line x1="60" y1="80" x2="3780" y2="80" stroke="#F59E0B" stroke-width="2" opacity="0.3"/>

  <text x="200" y="400" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="220" font-weight="900" fill="#8B5CF6">₹9</text>
  <text x="440" y="340" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#94A3B8">out of every ₹100</text>
  <text x="440" y="390" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#94A3B8">for subsidies</text>

  <text x="200" y="550" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#F8FAFC">Subsidies</text>
  <text x="200" y="610" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#64748B">Food, fuel, and fertiliser — anti-poverty support</text>
  <line x1="200" y1="650" x2="600" y2="650" stroke="#8B5CF6" stroke-width="3"/>

  <g transform="translate(200, 780)">
    <rect x="0" y="40" width="3000" height="60" rx="6" fill="#1E293B"/>
    <rect x="0" y="40" width="270" height="60" rx="6" fill="#8B5CF6"/>
    <text x="20" y="78" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#F8FAFC">₹9 — SUBSIDIES</text>
    <rect x="270" y="40" width="2730" height="60" rx="6" fill="#1E293B" opacity="0.5"/>
  </g>

  <!-- Subsidy breakdown bars -->
  <g transform="translate(200, 1000)">
    <text x="0" y="30" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#94A3B8">SUBSIDY BREAKDOWN</text>
    <rect x="0" y="60" width="1800" height="50" rx="4" fill="#1E293B"/>
    <rect x="0" y="60" width="800" height="50" rx="4" fill="#F59E0B" opacity="0.8"/>
    <text x="20" y="92" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#F8FAFC">Food (₹2.7L Cr)</text>

    <rect x="0" y="130" width="1800" height="50" rx="4" fill="#1E293B"/>
    <rect x="0" y="130" width="550" height="50" rx="4" fill="#F59E0B" opacity="0.6"/>
    <text x="20" y="162" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#F8FAFC">Fertiliser (₹1.9L Cr)</text>

    <rect x="0" y="200" width="1800" height="50" rx="4" fill="#1E293B"/>
    <rect x="0" y="200" width="350" height="50" rx="4" fill="#F59E0B" opacity="0.4"/>
    <text x="20" y="232" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#F8FAFC">Fuel/Petroleum (₹1.2L Cr)</text>
  </g>

  <g transform="translate(2200, 1000)">
    <rect x="0" y="0" width="1100" height="200" rx="12" fill="#111827" stroke="#1E293B" stroke-width="1"/>
    <text x="40" y="45" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#EF4444">CONCERN</text>
    <text x="40" y="90" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">Subsidies are poorly targeted — only 40%</text>
    <text x="40" y="125" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">of food subsidy reaches the intended poor.</text>
    <text x="40" y="160" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#64748B">Source: Economic Survey 2025-26</text>
  </g>
  
  <rect x="0" y="2100" width="3840" height="60" fill="#111827" opacity="0.4"/>
  <text x="1920" y="2136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle" letter-spacing="2">NEWSJACK · EDITORIAL INFOGRAPHIC</text>
</svg>