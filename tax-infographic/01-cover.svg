
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F59E0B22"/>
      <stop offset="100%" stop-color="#F59E0B00"/>
    </radialGradient>
  </defs>
  <rect width="3840" height="2160" fill="url(#g1)"/>
  <rect width="3840" height="2160" fill="url(#glow)"/>

  
  <rect x="0" y="0" width="3840" height="80" fill="#111827" opacity="0.6"/>
  <text x="60" y="52" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#94A3B8" letter-spacing="4">COVER</text>
  <text x="3780" y="52" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#F59E0B" text-anchor="end">1/10</text>
  <line x1="60" y1="80" x2="3780" y2="80" stroke="#F59E0B" stroke-width="2" opacity="0.3"/>

  <!-- Big rupee symbol -->
  <text x="1920" y="340" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="200" font-weight="900" fill="#F59E0B" text-anchor="middle" opacity="0.15">₹</text>

  <!-- Title -->
  <text x="1920" y="520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="72" font-weight="900" fill="#F8FAFC" text-anchor="middle" letter-spacing="1">Where Does Your ₹100 of Tax</text>
  <text x="1920" y="610" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="72" font-weight="900" fill="#F59E0B" text-anchor="middle" letter-spacing="1">Actually Go?</text>

  <!-- Subtitle -->
  <rect x="1620" y="680" width="600" height="2" fill="#F59E0B" opacity="0.5"/>
  <text x="1920" y="740" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#94A3B8" text-anchor="middle">India spends ₹50.65 Lakh Crore. Here's the breakdown.</text>
  <rect x="1620" y="770" width="600" height="2" fill="#F59E0B" opacity="0.5"/>

  <!-- Visual: Simplified pie/donut chart -->
  <g transform="translate(1920, 1300)">
    <!-- Outer ring segments -->
    <circle cx="0" cy="0" r="280" fill="none" stroke="#1E293B" stroke-width="50"/>
    <circle cx="0" cy="0" r="280" fill="none" stroke="#F59E0B" stroke-width="50"
      stroke-dasharray="69 691" stroke-dashoffset="0" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="280" fill="none" stroke="#3B82F6" stroke-width="50"
      stroke-dasharray="76 691" stroke-dashoffset="-69" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="280" fill="none" stroke="#10B981" stroke-width="50"
      stroke-dasharray="79 691" stroke-dashoffset="-145" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="280" fill="none" stroke="#EF4444" stroke-width="50"
      stroke-dasharray="29 691" stroke-dashoffset="-224" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="280" fill="none" stroke="#8B5CF6" stroke-width="50"
      stroke-dasharray="32 691" stroke-dashoffset="-253" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="280" fill="none" stroke="#06B6D4" stroke-width="50"
      stroke-dasharray="14 691" stroke-dashoffset="-285" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="280" fill="none" stroke="#64748B" stroke-width="50"
      stroke-dasharray="43 691" stroke-dashoffset="-299" transform="rotate(-90)"/>
    <!-- Center text -->
    <circle cx="0" cy="0" r="200" fill="#111827"/>
    <text x="0" y="-20" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="80" font-weight="900" fill="#F59E0B" text-anchor="middle">₹100</text>
    <text x="0" y="40" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" fill="#94A3B8" text-anchor="middle">OF EVERY TAX ₹</text>
  </g>

  <!-- Legend -->
  <g transform="translate(1420, 1750)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#F59E0B" stroke-width="6"/><text x="42" y="6" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">Interest (19%)</text>
    <line x1="220" y1="0" x2="250" y2="0" stroke="#3B82F6" stroke-width="6"/><text x="262" y="6" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">States (21%)</text>
    <line x1="440" y1="0" x2="470" y2="0" stroke="#10B981" stroke-width="6"/><text x="482" y="6" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">Infra (22%)</text>
    <line x1="660" y1="0" x2="690" y2="0" stroke="#EF4444" stroke-width="6"/><text x="702" y="6" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">Defence (8%)</text>
    <line x1="220" y1="36" x2="250" y2="36" stroke="#8B5CF6" stroke-width="6"/><text x="262" y="42" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">Subsidies (9%)</text>
    <line x1="440" y1="36" x2="470" y2="36" stroke="#06B6D4" stroke-width="6"/><text x="482" y="42" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">Pensions (5%)</text>
    <line x1="660" y1="36" x2="690" y2="36" stroke="#64748B" stroke-width="6"/><text x="702" y="42" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">Other (12%)</text>
  </g>

  
  <rect x="0" y="2100" width="3840" height="60" fill="#111827" opacity="0.4"/>
  <text x="1920" y="2136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle" letter-spacing="2">NEWSJACK · EDITORIAL INFOGRAPHIC</text>
</svg>