    <text x="40" y="40" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#EF4444">SOCIAL SPENDING AS % OF GDP</text>

    <!-- Dots and lines for historical data -->
    <text x="200" y="120" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#94A3B8" text-anchor="middle">1.8%</text>
    <text x="200" y="145" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle">2014-15</text>

    <text x="600" y="100" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#94A3B8" text-anchor="middle">1.9%</text>
    <text x="600" y="125" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle">2018-19</text>

    <text x="1000" y="80" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#94A3B8" text-anchor="middle">2.1%</text>
    <text x="1000" y="105" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle">2021-22</text>

    <text x="1400" y="140" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#EF4444" text-anchor="middle">1.2%</text>
    <text x="1400" y="165" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#EF4444" text-anchor="middle">2025-26</text>

    <polyline points="200,118 600,98 1000,78 1400,138"
      fill="none" stroke="#EF4444" stroke-width="3" stroke-dasharray="8 4" opacity="0.6"/>
  </g>

  <g transform="translate(2000, 1000)">
    <rect x="0" y="0" width="1100" height="300" rx="12" fill="#111827" stroke="#1E293B" stroke-width="1"/>
    <text x="40" y="40" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#EF4444">CRITICAL ALERT</text>
    <text x="40" y="95" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" fill="#94A3B8">Social sector spending is at its</text>
    <text x="40" y="135" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48" font-weight="900" fill="#EF4444">lowest</text>
    <text x="40" y="180" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" fill="#94A3B8">level in 12 years.</text>
    <text x="40" y="225" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#64748B">Health: 0.3% of GDP → well below BRICS avg</text>
    <text x="40" y="260" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#64748B">Education: 0.5% of GDP → 6% target unmet</text>
  </g>
  
  <rect x="0" y="2100" width="3840" height="60" fill="#111827" opacity="0.4"/>
  <text x="1920" y="2136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle" letter-spacing="2">NEWSJACK · EDITORIAL INFOGRAPHIC</text>
