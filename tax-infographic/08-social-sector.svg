
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160">
  <rect x="0" y="0" width="3840" height="2160" fill="#0B1120"/>
  <defs>
    <linearGradient id="g8" x1="0" y1="0" x2="0" y2="2160">
      <stop offset="0%" stop-color="#EF444415"/>
      <stop offset="100%" stop-color="#EF444400"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="3840" height="2160" fill="url(#g8)"/>
  
  <rect x="0" y="0" width="3840" height="80" fill="#111827" opacity="0.6"/>
  <text x="60" y="52" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#94A3B8" letter-spacing="4">TAX BREAKDOWN · INDIA 2026</text>
  <text x="3780" y="52" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#F59E0B" text-anchor="end">8/10</text>
  <line x1="60" y1="80" x2="3780" y2="80" stroke="#F59E0B" stroke-width="2" opacity="0.3"/>

  <text x="200" y="400" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="220" font-weight="900" fill="#EF4444">₹4</text>
  <text x="440" y="340" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#94A3B8">out of every ₹100</text>
  <text x="440" y="390" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#94A3B8">for social welfare</text>

  <text x="200" y="550" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#F8FAFC">Social Sector</text>
  <text x="200" y="610" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#64748B">Health, education, housing — lowest in 12 years</text>
  <line x1="200" y1="650" x2="600" y2="650" stroke="#EF4444" stroke-width="3"/>

  <g transform="translate(200, 780)">
    <rect x="0" y="40" width="3000" height="60" rx="6" fill="#1E293B"/>
    <rect x="0" y="40" width="120" height="60" rx="6" fill="#EF4444"/>
    <text x="20" y="78" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#F8FAFC">₹4 — SOCIAL SECTOR</text>
    <rect x="120" y="40" width="2880" height="60" rx="6" fill="#1E293B" opacity="0.5"/>
  </g>

  <!-- Historical comparison -->
  <g transform="translate(200, 1000)">
