    <text x="20" y="78" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#F8FAFC">₹5 — PENSIONS</text>
    <rect x="150" y="40" width="2850" height="60" rx="6" fill="#1E293B" opacity="0.5"/>
  </g>

