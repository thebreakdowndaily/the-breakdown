    <circle cx="60" cy="220" r="6" fill="#06B6D4"/><text x="50" y="248" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle">2016</text>
    <circle cx="400" cy="180" r="6" fill="#06B6D4"/><text x="400" y="248" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle">2020</text>
    <circle cx="800" cy="120" r="6" fill="#06B6D4"/><text x="800" y="248" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle">2023</text>
    <circle cx="1400" cy="30" r="6" fill="#06B6D4"/><text x="1400" y="248" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle">2026</text>
