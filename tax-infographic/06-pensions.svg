    <text x="40" y="135" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="48" font-weight="900" fill="#EF4444">tripled</text>
    <text x="40" y="180" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" fill="#94A3B8">in the last decade.</text>
    <text x="40" y="225" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#64748B">Old pension scheme (OPS) vs NPS debate ongoing</text>
    <text x="40" y="260" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#64748B">Unfunded liability estimated at ₹36L Cr+</text>
