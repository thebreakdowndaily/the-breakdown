    <rect x="840" y="0" width="380" height="60" rx="30" fill="#1E293B" stroke="#F59E0B" stroke-width="1"/>
    <text x="1030" y="38" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#F59E0B" text-anchor="middle">Share for taxpayer transparency</text>
  </g>

  <!-- Hashtags -->
  <text x="1920" y="1450" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#64748B" text-anchor="middle" letter-spacing="1">#TaxReform  #India  #WhereYourMoneyGoes  #Budget2026  #PublicFinance</text>

  
  <rect x="0" y="2100" width="3840" height="60" fill="#111827" opacity="0.4"/>
  <text x="1920" y="2136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle" letter-spacing="2">NEWSJACK · EDITORIAL INFOGRAPHIC</text>
