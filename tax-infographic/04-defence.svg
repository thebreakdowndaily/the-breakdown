
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160">
  <rect x="0" y="0" width="3840" height="2160" fill="#0B1120"/>
  <defs>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="2160">
      <stop offset="0%" stop-color="#10B98115"/>
      <stop offset="100%" stop-color="#10B98100"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="3840" height="2160" fill="url(#g4)"/>
  
  <rect x="0" y="0" width="3840" height="80" fill="#111827" opacity="0.6"/>
  <text x="60" y="52" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#94A3B8" letter-spacing="4">TAX BREAKDOWN · INDIA 2026</text>
  <text x="3780" y="52" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#F59E0B" text-anchor="end">4/10</text>
  <line x1="60" y1="80" x2="3780" y2="80" stroke="#F59E0B" stroke-width="2" opacity="0.3"/>

  <text x="200" y="400" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="220" font-weight="900" fill="#10B981">₹8</text>
  <text x="440" y="340" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#94A3B8">out of every ₹100</text>
  <text x="440" y="390" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#94A3B8">for defence and military</text>

  <text x="200" y="550" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="#F8FAFC">Defence &amp; Military</text>
  <text x="200" y="610" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#64748B">Second largest allocation after interest payments</text>
  <line x1="200" y1="650" x2="600" y2="650" stroke="#10B981" stroke-width="3"/>

  <!-- Bar -->
  <g transform="translate(200, 780)">
    <rect x="0" y="40" width="3000" height="60" rx="6" fill="#1E293B"/>
    <rect x="0" y="40" width="240" height="60" rx="6" fill="#10B981"/>
    <text x="20" y="78" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#F8FAFC">₹8 — DEFENCE</text>
    <rect x="240" y="40" width="2760" height="60" rx="6" fill="#1E293B" opacity="0.5"/>
  </g>

  <g transform="translate(200, 980)">
    <rect x="0" y="0" width="1100" height="200" rx="12" fill="#111827" stroke="#1E293B" stroke-width="1"/>
    <text x="40" y="45" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#10B981">BREAKDOWN</text>
    <text x="40" y="90" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">• Revenue expenditure: ₹3.2L Cr (salaries, ops)</text>
    <text x="40" y="125" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">• Capital expenditure: ₹1.6L Cr (new equipment)</text>
    <text x="40" y="160" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">• Modernisation & border infrastructure</text>
  </g>

  <g transform="translate(1460, 980)">
    <rect x="0" y="0" width="1100" height="200" rx="12" fill="#111827" stroke="#1E293B" stroke-width="1"/>
    <text x="40" y="45" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#64748B">GLOBAL CONTEXT</text>
    <text x="40" y="95" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#F8FAFC">2% of GDP</text>
    <text x="40" y="135" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#94A3B8">India's defence spend as % of GDP</text>
    <text x="40" y="170" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#64748B">China: 1.7% · USA: 3.5% · Russia: 4.1%</text>
  </g>
  
  <rect x="0" y="2100" width="3840" height="60" fill="#111827" opacity="0.4"/>
  <text x="1920" y="2136" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle" letter-spacing="2">NEWSJACK · EDITORIAL INFOGRAPHIC</text>
