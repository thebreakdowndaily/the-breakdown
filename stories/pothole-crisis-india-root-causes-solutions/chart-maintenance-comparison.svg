<svg viewBox="0 0 760 300" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6F00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF6F00;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <rect width="760" height="300" fill="#0A0A0A"/>
  <text x="380" y="28" font-family="Bebas Neue,sans-serif" font-size="18" fill="#FF6F00" text-anchor="middle" letter-spacing="1">ROAD MAINTENANCE SPENDING: INDIA vs THE WORLD</text>
  <text x="380" y="46" font-family="JetBrains Mono,monospace" font-size="9" fill="#666" text-anchor="middle">% of total road budget allocated to maintenance</text>

  <!-- Italy 72% -->
  <text x="160" y="75" font-family="JetBrains Mono,monospace" font-size="11" fill="#ccc" text-anchor="end">Italy</text>
  <rect x="170" y="62" width="432" height="20" rx="3" fill="rgba(255,111,0,0.15)"/>
  <rect x="170" y="62" width="432" height="20" rx="3" fill="url(#barGrad)"/>
  <text x="610" y="76" font-family="JetBrains Mono,monospace" font-size="11" fill="#FF6F00">72%</text>

  <!-- Austria 61% -->
  <text x="160" y="105" font-family="JetBrains Mono,monospace" font-size="11" fill="#ccc" text-anchor="end">Austria</text>
  <rect x="170" y="92" width="366" height="20" rx="3" fill="rgba(255,111,0,0.15)"/>
  <rect x="170" y="92" width="366" height="20" rx="3" fill="url(#barGrad)"/>
  <text x="544" y="106" font-family="JetBrains Mono,monospace" font-size="11" fill="#FF6F00">61%</text>

  <!-- US 48% -->
  <text x="160" y="135" font-family="JetBrains Mono,monospace" font-size="11" fill="#ccc" text-anchor="end">United States</text>
  <rect x="170" y="122" width="288" height="20" rx="3" fill="rgba(255,111,0,0.15)"/>
  <rect x="170" y="122" width="288" height="20" rx="3" fill="url(#barGrad)"/>
  <text x="466" y="136" font-family="JetBrains Mono,monospace" font-size="11" fill="#FF6F00">48%</text>

  <!-- UK 40% -->
  <text x="160" y="165" font-family="JetBrains Mono,monospace" font-size="11" fill="#ccc" text-anchor="end">UK</text>
  <rect x="170" y="152" width="240" height="20" rx="3" fill="rgba(255,111,0,0.15)"/>
  <rect x="170" y="152" width="240" height="20" rx="3" fill="url(#barGrad)"/>
  <text x="418" y="166" font-family="JetBrains Mono,monospace" font-size="11" fill="#FF6F00">~40%</text>

  <!-- NITI Aayog Recommended 10% -->
  <text x="160" y="195" font-family="JetBrains Mono,monospace" font-size="11" fill="#aaa" text-anchor="end" font-style="italic">NITI Aayog Recommended</text>
  <rect x="170" y="182" width="60" height="20" rx="3" fill="rgba(255,200,0,0.2)" stroke="#FFC800" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="238" y="196" font-family="JetBrains Mono,monospace" font-size="11" fill="#FFC800">10%</text>

  <!-- India 1-2% -->
  <text x="160" y="230" font-family="JetBrains Mono,monospace" font-size="11" fill="#FF4500" text-anchor="end" font-weight="bold">India</text>
  <rect x="170" y="217" width="12" height="20" rx="3" fill="#FF4500"/>
  <text x="190" y="231" font-family="JetBrains Mono,monospace" font-size="11" fill="#FF4500" font-weight="bold">~1-2%</text>
  <text x="240" y="231" font-family="JetBrains Mono,monospace" font-size="9" fill="#666">(Rs 4,595 cr of Rs 2.87 lakh cr budget)</text>

  <text x="380" y="275" font-family="JetBrains Mono,monospace" font-size="9" fill="#555" text-anchor="middle">Source: PRS India, ITF-OECD, Lincoln Institute</text>
</svg>