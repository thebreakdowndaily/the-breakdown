<svg viewBox="0 0 760 320" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fixGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6F00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF6F00;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <rect width="760" height="320" fill="#0A0A0A"/>
  <text x="380" y="30" font-family="Bebas Neue,sans-serif" font-size="20" fill="#FF6F00" text-anchor="middle" letter-spacing="1">POTHOLE DEATHS IN INDIA: +53% IN 5 YEARS</text>
  <text x="380" y="50" font-family="JetBrains Mono,monospace" font-size="10" fill="#666" text-anchor="middle">Source: MoRTH Lok Sabha Reply, Feb 12, 2026</text>

  <!-- Y axis labels -->
  <text x="55" y="115" font-family="JetBrains Mono,monospace" font-size="10" fill="#888" text-anchor="end">2,500</text>
  <text x="55" y="155" font-family="JetBrains Mono,monospace" font-size="10" fill="#888" text-anchor="end">2,000</text>
  <text x="55" y="195" font-family="JetBrains Mono,monospace" font-size="10" fill="#888" text-anchor="end">1,500</text>
  <text x="55" y="235" font-family="JetBrains Mono,monospace" font-size="10" fill="#888" text-anchor="end">1,000</text>
  <text x="55" y="275" font-family="JetBrains Mono,monospace" font-size="10" fill="#888" text-anchor="end">500</text>

  <!-- Grid lines -->
  <line x1="70" y1="110" x2="740" y2="110" stroke="#222" stroke-width="1"/>
  <line x1="70" y1="150" x2="740" y2="150" stroke="#222" stroke-width="1"/>
  <line x1="70" y1="190" x2="740" y2="190" stroke="#222" stroke-width="1"/>
  <line x1="70" y1="230" x2="740" y2="230" stroke="#222" stroke-width="1"/>
  <line x1="70" y1="270" x2="740" y2="270" stroke="#222" stroke-width="1"/>
  <line x1="70" y1="300" x2="740" y2="300" stroke="#333" stroke-width="1"/>

  <!-- Bars: 2020-2024 -->
  <!-- 2020: 1555 -> map to y: 300 - (1555/2500 * 190) = 300 - 118 = 182 -->
  <rect x="100" y="182" width="80" height="118" rx="3" fill="#FF6F00" opacity="0.7"/>
  <text x="140" y="172" font-family="JetBrains Mono,monospace" font-size="12" fill="#FF6F00" text-anchor="middle">1,555</text>
  <text x="140" y="315" font-family="JetBrains Mono,monospace" font-size="11" fill="#aaa" text-anchor="middle">2020</text>

  <!-- 2021: 1481 -> 300 - 112 = 188 -->
  <rect x="215" y="188" width="80" height="112" rx="3" fill="#FF6F00" opacity="0.75"/>
  <text x="255" y="178" font-family="JetBrains Mono,monospace" font-size="12" fill="#FF6F00" text-anchor="middle">1,481</text>
  <text x="255" y="315" font-family="JetBrains Mono,monospace" font-size="11" fill="#aaa" text-anchor="middle">2021</text>

  <!-- 2022: 1856 -> 300 - 141 = 159 -->
  <rect x="330" y="159" width="80" height="141" rx="3" fill="#FF6F00" opacity="0.85"/>
  <text x="370" y="149" font-family="JetBrains Mono,monospace" font-size="12" fill="#FF6F00" text-anchor="middle">1,856</text>
  <text x="370" y="315" font-family="JetBrains Mono,monospace" font-size="11" fill="#aaa" text-anchor="middle">2022</text>

  <!-- 2023: 2161 -> 300 - 164 = 136 -->
  <rect x="445" y="136" width="80" height="164" rx="3" fill="#FF6F00" opacity="0.9"/>
  <text x="485" y="126" font-family="JetBrains Mono,monospace" font-size="12" fill="#FF6F00" text-anchor="middle">2,161</text>
  <text x="485" y="315" font-family="JetBrains Mono,monospace" font-size="11" fill="#aaa" text-anchor="middle">2023</text>

  <!-- 2024: 2385 -> 300 - 181 = 119 -->
  <rect x="560" y="119" width="80" height="181" rx="3" fill="#FF4500" opacity="1"/>
  <text x="600" y="109" font-family="JetBrains Mono,monospace" font-size="12" fill="#FF4500" text-anchor="middle">2,385</text>
  <text x="600" y="315" font-family="JetBrains Mono,monospace" font-size="11" fill="#aaa" text-anchor="middle">2024</text>

  <!-- Trend line -->
  <polyline points="140,182 255,188 370,159 485,136 600,119" fill="none" stroke="#FF4500" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Annotation -->
  <rect x="680" y="195" width="60" height="40" rx="4" fill="rgba(255,69,0,0.15)" stroke="#FF4500" stroke-width="1"/>
  <text x="710" y="213" font-family="JetBrains Mono,monospace" font-size="9" fill="#FF4500" text-anchor="middle">+53%</text>
  <text x="710" y="227" font-family="JetBrains Mono,monospace" font-size="8" fill="#888" text-anchor="middle">5-year</text>

  <!-- Over 6/day label -->
  <text x="600" y="104" font-family="JetBrains Mono,monospace" font-size="9" fill="#FF4500" text-anchor="middle">~6 deaths/day</text>
</svg>