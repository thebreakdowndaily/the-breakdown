<style>
/* ─── INCREDIBLE INDIA HUB ─── */
.hub-header{
  position:relative;
  padding:80px 0 60px;
  text-align:center;
  overflow:hidden;
}
.hub-header::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,153,51,0.08) 0%,transparent 20%,transparent 80%,rgba(19,136,8,0.06) 100%);
  pointer-events:none;
}
.hub-flag{
  display:flex;justify-content:center;gap:6px;margin-bottom:24px;
}
.hub-flag span{
  width:48px;height:4px;border-radius:2px;
}
.hub-flag span:nth-child(1){background:#FF9933}
.hub-flag span:nth-child(2){background:#FFFFFF}
.hub-flag span:nth-child(3){background:#138808}
.hub-header h1{
  font-family:var(--font-display);
  font-size:clamp(2.8rem,8vw,4.5rem);
  letter-spacing:0.04em;
  font-weight:400;
  margin-bottom:16px;
}
.hub-header h1 em{
  font-style:normal;
  background:linear-gradient(90deg,#FF9933,#FFFFFF,#138808);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hub-header .sub{
  font-size:var(--text-lg);
  color:var(--text-secondary);
  max-width:520px;
  margin:0 auto;
  font-family:var(--font-editorial);
  font-style:italic;
}
.hub-header .count{
  margin-top:16px;
  font-family:var(--font-mono);
  font-size:var(--text-xs);
  color:var(--text-tertiary);
}

/* Tricolor divider */
.tricolor-divider{
  display:flex;height:3px;margin:8px 0;
}
.tricolor-divider span{flex:1}
.tricolor-divider span:nth-child(1){background:#FF9933}
.tricolor-divider span:nth-child(2){background:#FFFFFF}
.tricolor-divider span:nth-child(3){background:#138808}

/* Incredible India badge */
.incredible-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(19,136,8,0.1);
  border:1px solid rgba(19,136,8,0.2);
  padding:4px 12px;
  border-radius:999px;
  font-family:var(--font-mono);
  font-size:0.65rem;
  color:#34D399;
  text-transform:uppercase;
  letter-spacing:0.06em;
  white-space:nowrap;
}
.incredible-badge::before{
  content:'';
  width:6px;height:6px;
  background:#34D399;
  border-radius:50%;
  opacity:0.7;
}

/* Manifesto */
.manifesto{
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:40px;
  margin-bottom:48px;
  text-align:center;
}
.manifesto .tricolor-divider{max-width:160px;margin:0 auto 20px}
.manifesto p{
  font-family:var(--font-editorial);
  font-size:1.05rem;
  color:var(--text-secondary);
  max-width:600px;
  margin:0 auto;
  line-height:1.7;
  font-style:italic;
}
.manifesto .cta{
  margin-top:20px;
  font-size:0.82rem;
  color:var(--text-tertiary);
  font-family:var(--font-mono);
}
.manifesto .cta a{color:var(--gold);text-decoration:none}
.manifesto .cta a:hover{text-decoration:underline}

/* Story card (hub) */
.hub-story-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  overflow:hidden;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  transition:border-color 0.3s, transform 0.2s;
  margin-bottom:24px;
}
.hub-story-card:hover{
  border-color:rgba(19,136,8,0.25);
  transform:translateY(-2px);
}
.hub-story-card-image{
  aspect-ratio:16/10;
  overflow:hidden;
  background:var(--bg-surface);
  position:relative;
  min-height:200px;
}
.hub-story-card-image img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 0.4s;
}
.hub-story-card:hover .hub-story-card-image img{
  transform:scale(1.03);
}
.hub-story-card-image .incredible-badge{
  position:absolute;
  top:12px;left:12px;
  background:rgba(7,7,8,0.85);
  backdrop-filter:blur(4px);
}
.hub-story-card-body{
  padding:32px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.hub-story-card-body .category{
  font-family:var(--font-mono);
  font-size:0.7rem;
  color:#34D399;
  letter-spacing:0.08em;
  text-transform:uppercase;
  margin-bottom:8px;
}
.hub-story-card-body h2{
  font-family:var(--font-editorial);
  font-size:1.4rem;
  font-weight:600;
  line-height:1.25;
  margin-bottom:10px;
}
.hub-story-card-body h2 a{
  color:var(--text);
  text-decoration:none;
}
.hub-story-card-body h2 a:hover{color:var(--gold)}
.hub-story-card-body p{
  font-size:0.88rem;
  color:var(--text-secondary);
  line-height:1.6;
  margin-bottom:16px;
}
.hub-story-card-body .meta{
  font-size:0.75rem;
  color:var(--text-tertiary);
  font-family:var(--font-mono);
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}
.hub-story-card-body .meta .tag{
  color:#34D399;
}
.hub-story-card-body .meta .dot{color:var(--border-light)}

/* Empty state */
.hub-empty{
  text-align:center;
  padding:80px 20px;
  border:1px dashed var(--border);
  border-radius:var(--radius-lg);
}
.hub-empty p{
  font-family:var(--font-editorial);
  font-size:1.05rem;
  color:var(--text-tertiary);
  font-style:italic;
}

/* Loading skeleton */
.hub-skeleton{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  overflow:hidden;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  margin-bottom:24px;
  min-height:280px;
}
.hub-skeleton .skel-img{background:var(--bg-elevated)}
.hub-skeleton .skel-body{padding:32px}
.hub-skeleton .skel-body .bar{
  height:14px;
  background:var(--bg-elevated);
  border-radius:4px;
  margin-bottom:10px;
}
.hub-skeleton .skel-body .bar.w60{width:60%}
.hub-skeleton .skel-body .bar.w90{width:90%}
.hub-skeleton .skel-body .bar.w40{width:40%}

@media(max-width:768px){
  .hub-story-card{grid-template-columns:1fr}
  .hub-story-card-image{aspect-ratio:16/9;min-height:180px}
  .hub-story-card-body{padding:24px}
  .hub-story-card-body h2{font-size:1.2rem}
  .hub-skeleton{grid-template-columns:1fr}
}
</style>
<style>body{padding-top:60px}</style>
</head>
<body>

<div class="container" style="max-width:820px">

  <div class="hub-header">
    <div class="hub-flag"><span></span><span></span><span></span></div>
    <h1>INCREDIBLE <em>INDIA</em></h1>
    <p class="sub">Ordinary Indians, Extraordinary Impact</p>
    <p class="count" id="storyCount">Loading...</p>
  </div>

  <div class="manifesto">
    <div class="tricolor-divider"><span></span><span></span><span></span></div>
    <p>The Breakdown profiles Indians solving real problems, winning on world stages, and redefining what's possible — at home and across the globe.</p>
    <p class="cta">Know an incredible Indian? <a href="mailto:incredible@thebreakdown.in">Tell us →</a></p>
  </div>

  <div id="hubStoryGrid"></div>

</div>

<script>
(function(){
  var grid = document.getElementById('hubStoryGrid');
  var countEl = document.getElementById('storyCount');

  // Show skeleton
  grid.innerHTML =
    '<div class="hub-skeleton"><div class="skel-img"></div><div class="skel-body"><div class="bar w60"></div><div class="bar w90"></div><div class="bar w90"></div><div class="bar w40"></div></div></div>' +
    '<div class="hub-skeleton"><div class="skel-img"></div><div class="skel-body"><div class="bar w60"></div><div class="bar w90"></div><div class="bar w90"></div><div class="bar w40"></div></div></div>';

  var api = '/api/stories/by-tag/incredible-india';

  fetch(api)
    .then(function(r){ return r.json(); })
    .then(function(data){
      var stories = data.stories || [];
      countEl.textContent = stories.length + ' ' + (stories.length === 1 ? 'Story' : 'Stories') + ' · Updated ' + new Date().toLocaleDateString('en-IN', {day:'numeric', month:'long', year:'numeric'});

      if (!stories.length) {
        grid.innerHTML = '<div class="hub-empty"><p>No stories yet. The first Incredible India story is being written right now.</p></div>';
        return;
      }

      var html = '';
      stories.forEach(function(s){
        var date = s.published_at ? new Date(s.published_at).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'}) : '';
        var tags = (s.tags || []).slice(0,3);
        var tagHtml = tags.map(function(t){ return '<span class="tag">#' + t.replace(/\s+/g,'') + '</span>'; }).join('<span class="dot"> · </span>');
        var imgUrl = s.fact_check_image || 'https://thebreakdown.in/og-image.png';
        var cat = s.category || 'Feature';

        html +=
          '<a href="/story/' + s.slug + '" class="hub-story-card" style="text-decoration:none;color:inherit">' +
            '<div class="hub-story-card-image">' +
              '<img src="' + imgUrl + '" alt="' + s.title.replace(/"/g,'&quot;') + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div style=\\\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg-surface);color:var(--text-tertiary);font-size:0.85rem\\\'>📷</div>\'">' +
              '<div class="incredible-badge">🇮🇳 Incredible India</div>' +
            '</div>' +
            '<div class="hub-story-card-body">' +
              '<div class="category">' + cat + '</div>' +
              '<h2>' + s.title + '</h2>' +
              (s.summary ? '<p>' + s.summary.replace(/<[^>]+>/g,'').substring(0,200) + '</p>' : '') +
              '<div class="meta"><span>' + date + '</span>' + (tagHtml ? '<span class="dot">·</span> ' + tagHtml : '') + (s.read_time ? '<span class="dot">·</span> <span>' + s.read_time + ' min read</span>' : '') + '</div>' +
            '</div>' +
          '</a>';
      });
      grid.innerHTML = html;
    })
    .catch(function(err){
      grid.innerHTML = '<div class="hub-empty"><p>Could not load stories. Please try again later.</p></div>';
      countEl.textContent = 'Unable to load';
    });
})();
</script>

</body>
