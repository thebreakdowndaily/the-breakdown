<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Stories — The Breakdown</title>
<meta name="description" content="Browse every dispatch, investigation, and intelligence briefing published by The Breakdown.">
<meta property="og:title" content="All Stories — The Breakdown">
<meta property="og:description" content="Browse every dispatch, investigation, and intelligence briefing published by The Breakdown.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="The Breakdown">
<meta property="og:url" content="https://thebreakdown.in/stories">
<meta name="twitter:card" content="summary_large_image">
<meta name="google-site-verification" content="">
<meta name="twitter:site" content="@thebreakdownin">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/design-system.css?v=5">
<link rel="stylesheet" href="/css/editorial.css?v=5">
<script defer src="/js/components.js?v=5"></script>
<script defer data-domain="thebreakdown.in" src="https://plausible.io/js/script.js"></script>
<style>body{padding-top:60px}</style>
</head>
<body>


<main id="main">
<div class="page-header">
<h1>All Stories</h1>
<p>Every dispatch, investigation, and intelligence briefing published by The Breakdown.</p>
</div>

<div class="controls">
<div class="search-wrap">
<span class="search-icon" aria-hidden="true">&#x1F50D;</span>
<input type="search" id="searchInput" placeholder="Search stories..." aria-label="Search stories">
</div>
<div class="filter-bar" id="filterBar" role="tablist" aria-label="Filter by category"></div>
</div>

<div class="count-bar" id="countBar"></div>

<div class="stories-grid" id="storiesGrid" role="list">
  <div class="story-card is-skeleton"><div class="story-card-img-placeholder skeleton"></div><div class="story-card-body"><div class="skeleton" style="width:60px;height:12px;margin-bottom:8px"></div><div class="skeleton" style="width:100%;height:22px;margin-bottom:6px"></div><div class="skeleton" style="width:80%;height:22px;margin-bottom:12px"></div><div class="skeleton" style="width:100%;height:14px;margin-bottom:4px"></div><div class="skeleton" style="width:70%;height:14px"></div></div></div>
  <div class="story-card is-skeleton"><div class="story-card-img-placeholder skeleton"></div><div class="story-card-body"><div class="skeleton" style="width:60px;height:12px;margin-bottom:8px"></div><div class="skeleton" style="width:100%;height:22px;margin-bottom:6px"></div><div class="skeleton" style="width:80%;height:22px;margin-bottom:12px"></div><div class="skeleton" style="width:100%;height:14px;margin-bottom:4px"></div><div class="skeleton" style="width:70%;height:14px"></div></div></div>
  <div class="story-card is-skeleton"><div class="story-card-img-placeholder skeleton"></div><div class="story-card-body"><div class="skeleton" style="width:60px;height:12px;margin-bottom:8px"></div><div class="skeleton" style="width:100%;height:22px;margin-bottom:6px"></div><div class="skeleton" style="width:80%;height:22px;margin-bottom:12px"></div><div class="skeleton" style="width:100%;height:14px;margin-bottom:4px"></div><div class="skeleton" style="width:70%;height:14px"></div></div></div>
  <div class="story-card is-skeleton"><div class="story-card-img-placeholder skeleton"></div><div class="story-card-body"><div class="skeleton" style="width:60px;height:12px;margin-bottom:8px"></div><div class="skeleton" style="width:100%;height:22px;margin-bottom:6px"></div><div class="skeleton" style="width:80%;height:22px;margin-bottom:12px"></div><div class="skeleton" style="width:100%;height:14px;margin-bottom:4px"></div><div class="skeleton" style="width:70%;height:14px"></div></div></div>
  <div class="story-card is-skeleton"><div class="story-card-img-placeholder skeleton"></div><div class="story-card-body"><div class="skeleton" style="width:60px;height:12px;margin-bottom:8px"></div><div class="skeleton" style="width:100%;height:22px;margin-bottom:6px"></div><div class="skeleton" style="width:80%;height:22px;margin-bottom:12px"></div><div class="skeleton" style="width:100%;height:14px;margin-bottom:4px"></div><div class="skeleton" style="width:70%;height:14px"></div></div></div>
  <div class="story-card is-skeleton"><div class="story-card-img-placeholder skeleton"></div><div class="story-card-body"><div class="skeleton" style="width:60px;height:12px;margin-bottom:8px"></div><div class="skeleton" style="width:100%;height:22px;margin-bottom:6px"></div><div class="skeleton" style="width:80%;height:22px;margin-bottom:12px"></div><div class="skeleton" style="width:100%;height:14px;margin-bottom:4px"></div><div class="skeleton" style="width:70%;height:14px"></div></div></div>
</div>
<div class="empty-state" id="emptyState" style="display:none"><p>No stories match your search or filter.</p></div>
</main>



<script>
const storiesGrid = document.getElementById('storiesGrid');
const filterBar = document.getElementById('filterBar');
const countBar = document.getElementById('countBar');
const searchInput = document.getElementById('searchInput');
const emptyState = document.getElementById('emptyState');
let allStories = [], currentFilter = 'all', searchQuery = '';

const buildFilters = (stories) => {
  const cats = [...new Set(stories.map(s => (s.category || 'Latest').toLowerCase()))].sort();
  filterBar.innerHTML = '<button class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>' +
    cats.map(c => `<button class="filter-btn" data-filter="${c}" role="tab" aria-selected="false">${c}</button>`).join('');
  filterBar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterBar.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
      btn.classList.add('active'); btn.setAttribute('aria-selected', 'true');
      currentFilter = btn.getAttribute('data-filter');
      render();
    });
  });
};

const render = () => {
  let filtered = currentFilter === 'all' ? allStories : allStories.filter(s => (s.category || 'latest').toLowerCase() === currentFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(s => (s.title + ' ' + s.summary + ' ' + s.author + ' ' + (s.tags || []).join(' ')).toLowerCase().includes(q));
  }
  if (!filtered.length) {
    storiesGrid.innerHTML = '';
    emptyState.style.display = 'block';
    countBar.textContent = '0 stories';
    return;
  }
  emptyState.style.display = 'none';
  countBar.textContent = filtered.length + ' stor' + (filtered.length === 1 ? 'y' : 'ies');
  storiesGrid.innerHTML = filtered.map(s => {
    const dt = s.published_at ? new Date(s.published_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : '';
    const cat = s.category || 'Latest';
    const img = s.fact_check_image
      ? `<img src="${s.fact_check_image}" alt="" loading="lazy" class="story-card-img">`
      : '<div class="story-card-img-placeholder"></div>';
    const badge = s.story_status === 'breaking' ? '<span style="font-family:JetBrains Mono,monospace;font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:2px;background:rgba(196,69,69,0.12);color:#C44545;text-transform:uppercase;margin-right:8px">Breaking</span>' : '';
    return '<a href="/story/' + s.slug + '" class="story-card" role="listitem">' + img +
      '<div class="story-card-body">' +
      '<div class="story-card-cat">' + cat + '</div>' +
      '<div class="story-card-title">' + s.title + '</div>' +
      '<div class="story-card-summary">' + (s.summary || '') + '</div>' +
      '<div class="story-card-meta">' + badge + dt + (s.read_time ? ' · ' + s.read_time + ' min read' : '') + (s.author ? ' · ' + s.author : '') + '</div>' +
      '</div></a>';
  }).join('');
};

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  render();
});

(async () => {
  try {
    const res = await fetch('/api/stories/published?limit=100');
    const data = await res.json();
    allStories = data.stories || [];
    buildFilters(allStories);
    render();
  } catch (e) {
    storiesGrid.innerHTML = '<div class="empty-state"><p>Failed to load stories.</p></div>';
  }
})();
</script>
</body>
</html>
