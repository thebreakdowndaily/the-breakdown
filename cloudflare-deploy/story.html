<body>
<div id="no-components"></div>
<div class="story-back-nav"><a href="/stories" class="story-back-link">&larr; All Stories</a></div>
<div class="story-loading" id="storyLoading">
  <div class="loading-pulse"></div>
  <p>Loading story...</p>
</div>
<div id="content"></div>

<script>
var API='https://thebreakdown.in';
(function(){
var container=document.getElementById('content');
var loading=document.getElementById('storyLoading');

function init(){
var isPreview=new URLSearchParams(window.location.search).get('preview')==='1';
var ssrEl=document.getElementById('ssr-data');
var story=ssrEl?(function(){try{return JSON.parse(ssrEl.textContent)}catch(e){return null}})():null;
if(!story&&!isPreview){
var slug=window.location.pathname.replace(/^\/story\//,'').replace(/\/$/,'')||new URLSearchParams(window.location.search).get('slug');
if(!slug){loading.remove();container.innerHTML='<div class="story-loading" style="min-height:60vh"><p>Story not found.</p></div>';return}
fetch(isPreview?API+'/api/stories/preview/'+slug:API+'/api/stories/public/'+slug,isPreview?{credentials:'include'}:{}).then(function(r){if(!r.ok)throw Error();return r.json()}).then(function(result){story=result.story;if(!story)throw Error();render(story)}).catch(function(){loading.remove();container.innerHTML='<div class="story-loading" style="min-height:60vh"><p>Story not found or has been removed.</p></div>'});
return;
}
if(story)render(story);
}

function render(s){
loading.remove();
document.title=(s.meta_title||s.title)+' — The Breakdown';
var ogTitle=document.querySelector('meta[property="og:title"]');if(ogTitle)ogTitle.content=document.title;
var ogDesc=document.querySelector('meta[property="og:description"]');if(ogDesc)ogDesc.content=s.meta_description||s.summary||'';
var ogUrl=document.querySelector('meta[property="og:url"]');if(ogUrl)ogUrl.content='https://thebreakdown.in/story/'+s.slug;
var ogImg=document.querySelector('meta[property="og:image"]');if(ogImg)ogImg.content=s.og_image||s.fact_check_image||'';
var metaDesc=document.querySelector('meta[name="description"]');if(metaDesc)metaDesc.content=s.meta_description||s.summary||'';
var canonical=document.querySelector('link[rel="canonical"]');if(canonical)canonical.href='https://thebreakdown.in/story/'+s.slug;

var schema=document.getElementById('storySchema')||function(){var el=document.createElement('script');el.id='storySchema';el.type='application/ld+json';document.head.appendChild(el);return el}();
var schemaObj={"@context":"https://schema.org","@type":"NewsArticle"};schemaObj.headline=s.meta_title||s.title;schemaObj.description=s.meta_description||s.summary||'';schemaObj.image=s.og_image||s.fact_check_image||'https://thebreakdown.in/og-image.png';schemaObj.datePublished=s.published_at||'';schemaObj.dateModified=s.updated_at||s.published_at||'';schemaObj.author={"@type":"Organization","name":"The Breakdown"};schemaObj.publisher={"@type":"Organization","name":"The Breakdown","logo":{"@type":"ImageObject","url":"https://thebreakdown.in/favicon.svg"}};schema.textContent=JSON.stringify(schemaObj);

var c=transformContent(s.content||'');
var headings=c.match(/<h2[^>]*>.*?<\/h2>/g)||[];
var tocItems=headings.map(function(h,i){var m=h.match(/>([^<]+)</);return{id:'section-'+(i+1),text:m?m[1]:'Section'}});
var tocLinks=tocItems.map(function(t){return'<a href="#'+t.id+'">'+t.text+'</a>'}).join('');
var hasIntel=/<div class="intel-summary">/i.test(c);

var img=s.fact_check_image||'';
var vid=s.fact_check_video||'';
var heroMedia='';
if(vid){
  var ytMatch=vid.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  if(ytMatch) heroMedia='<div class="story-hero-media"><div class="video-container"><iframe src="https://www.youtube.com/embed/'+ytMatch[1]+'?autoplay=1&mute=1&loop=1&playlist='+ytMatch[1]+'" allow="autoplay; encrypted-media" allowfullscreen loading="eager"></iframe></div></div>';
  else if(vid.match(/\.(mp4|webm|ogg)(\?|$)/i)) heroMedia='<div class="story-hero-media"><video autoplay muted loop playsinline><source src="'+vid+'" type="video/'+(vid.match(/mp4/i)?'mp4':vid.match(/webm/i)?'webm':'ogg')+'"></video></div>';
}
if(!heroMedia && img) heroMedia='<div class="story-hero-media"><img src="'+img+'" alt="" loading="eager"></div>';
var dateStr=s.published_at?new Date(s.published_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}):'';
var wordCount=c.replace(/<[^>]+>/g,' ').split(/\s+/).filter(Boolean).length;
var readTime=Math.max(1,Math.round(wordCount/200));

container.innerHTML=
'<div class="reading-bar" id="readingBar"><div class="reading-bar-track" id="readingTrack"></div></div>'+
'<article>'+
'<div class="story-hero">'+
  heroMedia+
  '<div class="story-hero-gradient"></div>'+
  '<div class="story-hero-shimmer"></div>'+
  '<div class="story-hero-content">'+
    '<div class="story-hero-category">'+(s.category||'Story')+'</div>'+
    '<h1>'+s.title+'</h1>'+
    (s.summary?'<p class="subheadline">'+s.summary+'</p>':'')+
    '<div class="story-hero-meta">'+
      '<span class="byline"><span class="avatar">TB</span> The Breakdown Editorial Team</span>'+
      '<span class="sep"></span><span>'+dateStr+'</span>'+
      '<span class="sep"></span><span>'+readTime+' min read</span>'+
      '<span class="sep"></span>'+
      '<span class="fact-checked"><svg viewBox="0 0 12 12" fill="none"><path d="M10 3L4.5 8.5L2 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Fact-checked</span>'+
    '</div>'+
    '<div class="story-hero-actions">'+
      '<button class="share-btn" onclick="navigator.share?navigator.share({title:document.title,url:window.location.href}):navigator.clipboard.writeText(window.location.href)">Share</button>'+
      '<button class="share-btn" onclick="window.print()">Print</button>'+
    '</div>'+
  '</div>'+
'</div>'+
(!hasIntel?'<div class="intel-summary">'+
  '<div class="intel-summary-inner">'+
    '<div class="intel-summary-item"><h4>What happened</h4><p>'+(s.meta_description||s.summary||'')+'</p></div>'+
    '<div class="intel-summary-item"><h4>Why it matters</h4><p>This story traces the decisions, data, and dynamics behind a critical development.</p></div>'+
    '<div class="intel-summary-item"><h4>Key takeaway</h4><p>Scroll through the full analysis for sourced evidence, expert viewpoints, data visualisations, and the complete timeline of events.</p><div class="reading-estimate">Reading time: <span class="word-count">'+readTime+' min</span></div></div>'+
  '</div>'+
'</div>':'')+
'</div>'+
'<div class="story-nav" id="storyNav">'+
  '<div class="story-nav-inner">'+
    '<div class="story-nav-title">'+s.title+'</div>'+
    '<div class="story-nav-progress"><div class="story-nav-progress-fill" id="navProgressFill"></div></div>'+
  '</div>'+
'</div>'+
'<div class="story-toc" id="tocDropdown" style="display:none"><div class="story-toc-inner"><div class="story-toc-list">'+tocLinks+'</div></div></div>'+
'<div class="story-reading"><div class="article-body" id="storyBody">'+c+'</div></div>'+
'<div class="story-related">'+
  '<div class="story-related-header"><h3>More from The Breakdown</h3><p>Continue reading — related investigations and analysis</p></div>'+
  '<div class="story-related-grid" id="relatedGrid"></div>'+
'</div>'+
'<div class="story-reading"><div class="story-newsletter">'+
  '<h3>Stay informed</h3><p>Get the week\'s most important stories delivered to your inbox every Saturday.</p>'+
  '<form class="newsletter-form" action="/thank-you" method="get"><input type="email" name="email" placeholder="Enter your email" required><button type="submit" class="btn">Subscribe</button></form>'+
'</div></div>'+
'</article>';

tocItems.forEach(function(t,i){var el=document.getElementById(t.id);if(!el){var hs=document.querySelectorAll('.article-body h2');if(hs[i])hs[i].id=t.id}});
document.querySelectorAll('.story-toc-list a').forEach(function(a){a.addEventListener('click',function(e){e.preventDefault();var t=document.querySelector(this.getAttribute('href'));if(t)t.scrollIntoView({behavior:'smooth',block:'start'})})});
var tocObserver=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){var id=e.target.id;document.querySelectorAll('.story-toc-list a').forEach(function(a){a.classList.toggle('active',a.getAttribute('href')==='#'+id)})}})},{rootMargin:'-120px 0px -70% 0px'});
document.querySelectorAll('.article-body h2').forEach(function(h){tocObserver.observe(h)});
var onScroll=function(){var st=window.scrollY||document.documentElement.scrollTop;var dh=document.documentElement.scrollHeight-window.innerHeight;var p=dh>0?Math.min(st/dh*100,100):0;var t=document.getElementById('readingTrack');if(t)t.style.width=p+'%';var n=document.getElementById('storyNav');if(n)n.classList.toggle('visible',st>window.innerHeight*0.5);var f=document.getElementById('navProgressFill');if(f)f.style.width=p+'%'};
window.addEventListener('scroll',onScroll);onScroll();
var revObs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');revObs.unobserve(e.target)}})},{threshold:0.15});
document.querySelectorAll('.stat-card, .story-timeline-item, .story-quote, .story-callout, .evidence-card, .story-comparison, .story-chart, .story-table-wrap, .story-newsletter').forEach(function(el){el.classList.add('story-reveal');revObs.observe(el)});
fetch(API+'/api/stories/published?limit=3&exclude='+(s.slug||'')).then(function(r){if(!r.ok)throw Error();return r.json()}).then(function(d){var stories=d.stories||d.data||[];var grid=document.getElementById('relatedGrid');if(grid&&stories.length){grid.innerHTML=stories.slice(0,3).map(function(st){return'<div class="story-related-card"><div class="card-body"><div class="card-category">'+(st.category||'Latest')+'</div><h4><a href="/story/'+st.slug+'">'+(st.title||'')+'</a></h4><p>'+(st.summary||st.meta_description||'').substring(0,120)+'...</p></div></div>'}).join('')}}).catch(function(){});
}

function transformContent(html){
// Strip template-generated sections
html=html.replace(/<[a-z]+[^>]*class="[^"]*story-hero[^"]*"[^>]*>[\s\S]*?<\/[a-z]+>/g,'');
html=html.replace(/<div class="intel-summary">[\s\S]*?<\/div>/g,'');
html=html.replace(/<nav class="story-toc">[\s\S]*?<\/nav>/g,'');
html=html.replace(/<nav class="story-back-nav">[\s\S]*?<\/nav>/g,'');
html=html.replace(/<div class="reading-bar">[\s\S]*?<\/div>/g,'');
html=html.replace(/<nav class="story-nav" id="storyNav">[\s\S]*?<\/nav>/g,'').replace(/<nav class="story-nav">[\s\S]*?<\/nav>/g,'');
html=html.replace(/<div class="story-related">[\s\S]*?<\/div>/g,'');
html=html.replace(/<div class="story-newsletter">[\s\S]*?<\/div>/g,'');
// Strip outer document shell
html=html.replace(/<!DOCTYPE html><!-- build: 116042 -->
/i,'');
html=html.replace(/<html[^>]*>/g,'').replace(/<\/html>/g,'');
html=html.replace(/<head>[\s\S]*?<\/head>/g,'');
html=html.replace(/<body[^>]*>/g,'').replace(/<\/body>/g,'');
// Strip inline scripts
html=html.replace(/<script>[\s\S]*?<\/script>/g,'');
// Strip old editorial junk
html=html.replace(/\.hero-image[\s\S]*?\}/g,'').replace(/<div class="hero-image">[\s\S]*?<\/div>/g,'').replace(/<div class="hero-image-wrapper">[\s\S]*?<\/div>/g,'');
// YouTube → responsive embed
html=html.replace(/https?:\/\/(?:www\.)?youtube\.com\/watch\?v=([a-zA-Z0-9_-]+)(?:&\S*)?/g,'<div class="video-container"><iframe src="https://www.youtube.com/embed/$1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>');
html=html.replace(/https?:\/\/youtu\.be\/([a-zA-Z0-9_-]+)/g,'<div class="video-container"><iframe src="https://www.youtube.com/embed/$1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>');
// Captions
html=html.replace(/<p class="caption">/g,'<figcaption>').replace(/<\/p>\s*(?=<figcaption)/g,'');
// v3 → v4
html=html.replace(/class="editorial-stats"/g,'class="stat-grid"').replace(/class="editorial-stat"/g,'class="stat-card"');
html=html.replace(/class="editorial-quote"/g,'class="story-quote"').replace(/class="editorial-callout"/g,'class="story-callout"');
html=html.replace(/class="editorial-fact"/g,'class="evidence-card"').replace(/class="editorial-mythfact"/g,'class="story-comparison"');
html=html.replace(/class="editorial-timeline"/g,'class="story-timeline"').replace(/class="editorial-timeline-item"/g,'class="story-timeline-item"');
html=html.replace(/class="editorial-table-wrap"/g,'class="story-table-wrap"').replace(/class="editorial-chart"/g,'class="story-chart"').replace(/class="editorial-chart-caption"/g,'class="story-chart-caption"');
html=html.replace(/class="editorial-sources"/g,'class="story-sources"').replace(/class="editorial-image"/g,'class="story-image"').replace(/class="editorial-reveal"/g,'class="story-reveal"');
html=html.replace(/class="editorial-newsletter"/g,'class="story-newsletter"').replace(/class="editorial-related"/g,'class="story-related"');
// v2 → v4
html=html.replace(/class="stats-bar"/g,'class="stat-grid"').replace(/class="stat-card"/g,'class="stat-card"');
html=html.replace(/class="(?:pull-quote|blockquote)"/g,'class="story-quote"');
html=html.replace(/<blockquote>/g,'<div class="story-quote"><p>').replace(/<\/blockquote>/g,'</p></div>');
html=html.replace(/class="chart-container"/g,'class="story-chart"').replace(/class="chart-caption"/g,'class="story-chart-caption"');
html=html.replace(/class="table-wrap"/g,'class="story-table-wrap"').replace(/class="sources-box"/g,'class="story-sources"');
html=html.replace(/class="timeline"/g,'class="story-timeline"').replace(/class="timeline-item"/g,'class="story-timeline-item"');
html=html.replace(/class="date"/g,'class="tl-date"').replace(/class="event"/g,'class="tl-title"').replace(/class="detail"/g,'class="tl-detail"');
return html;
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
