<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UGC NET JRF — Flashcard Deck</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f1f5f9; padding: 20px; color: #1a1a1a; min-height: 100vh; }
  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 20pt; color: #b91c1c; }
  .header p { font-size: 10pt; color: #6b7280; margin-top: 4px; }
  .controls { text-align: center; margin-bottom: 16px; }
  .controls button, .controls select { padding: 6px 14px; font-size: 9pt; border: none; border-radius: 4px; cursor: pointer; margin: 0 3px; }
  .btn-shuffle { background: #1e40af; color: #fff; }
  .btn-all { background: #b91c1c; color: #fff; }
  .btn-p1 { background: #15803d; color: #fff; }
  .btn-p2 { background: #854d0e; color: #fff; }
  .counter { font-size: 9pt; color: #6b7280; margin-bottom: 10px; text-align: center; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; max-width: 1200px; margin: 0 auto; }
  .card { perspective: 800px; height: 160px; cursor: pointer; }
  .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; font-size: 9.5pt; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  .card-front { background: #fff; border: 2px solid #e5e7eb; }
  .card-front .tag { position: absolute; top: 6px; right: 8px; font-size: 6.5pt; padding: 2px 6px; border-radius: 3px; color: #fff; }
  .tag-p1 { background: #15803d; }
  .tag-p2 { background: #854d0e; }
  .card-back { background: #b91c1c; color: #fff; transform: rotateY(180deg); font-weight: 600; font-size: 10pt; border: 2px solid #991b1b; }
  .q-label { font-size: 7pt; color: #9ca3af; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
  @media (max-width: 600px) { .card-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>UGC NET JRF — Flashcard Deck</h1>
  <p>Tap/Click card to flip | Ready for last-minute revision</p>
</div>

<div class="controls">
  <button class="btn-p1" onclick="filterCards('p1')">Paper I Only</button>
  <button class="btn-p2" onclick="filterCards('p2')">Paper II Only</button>
  <button class="btn-all" onclick="filterCards('all')">All Cards</button>
  <button class="btn-shuffle" onclick="shuffleCards()">Shuffle</button>
  <select id="topicFilter" onchange="filterByTopic(this.value)" style="font-size:9pt;padding:6px 10px;border-radius:4px;border:1px solid #d1d5db;">
    <option value="all">All Topics</option>
    <option value="teaching">Teaching Aptitude</option>
    <option value="research">Research Aptitude</option>
    <option value="logical">Logical Reasoning</option>
    <option value="ict">ICT / Higher Edu</option>
    <option value="theories">Theories</option>
    <option value="models">Models</option>
    <option value="laws">Media Laws</option>
    <option value="journalism">Journalism History</option>
    <option value="devcom">Dev Comm / MacBride</option>
    <option value="adpr">Advertising / PR</option>
    <option value="scholars">Scholars</option>
    <option value="agencies">News Agencies</option>
  </select>
</div>

<div class="counter" id="counter"></div>
<div class="card-grid" id="cardGrid"></div>

<script>

  { q: "p-value less than 0.05 means", a: "Results are statistically significant", p: "p1", t: "research" },

  { q: "First Bengali newspaper — Name? Year?", a: "Samachar Darpan, 1818", p: "p2", t: "journalism" },
  { q: "Oldest surviving newspaper — Name? Year?", a: "Bombay Samachar, 1822", p: "p2", t: "journalism" },

  { q: "Freire — Association?", a: "Participatory Communication / Conscientization", p: "p2", t: "scholars" },
  { q: "Schramm — Association?", a: "Development Communication / Models", p: "p2", t: "scholars" },
  { q: "Entman — Association?", a: "Framing (refined concept)", p: "p2", t: "scholars" },
  { q: "Article 19(1)(a) — About?", a: "Freedom of speech and expression (with reasonable restrictions under 19(2))", p: "p2", t: "laws" },

var currentCards = cards.slice();

function render() {
  var grid = document.getElementById('cardGrid');
  var counter = document.getElementById('counter');
  grid.innerHTML = '';
  for (var i = 0; i < currentCards.length; i++) {
    var card = currentCards[i];
    var div = document.createElement('div');
    div.className = 'card';
    var tagClass = card.p === 'p1' ? 'tag-p1' : 'tag-p2';
    var tagText = card.p === 'p1' ? 'Paper I' : 'Paper II';
    div.innerHTML =
      '<div class="card-inner">' +
        '<div class="card-front">' +
          '<span class="tag ' + tagClass + '">' + tagText + '</span>' +
          '<div class="q-label">Question</div>' +
          card.q +
        '</div>' +
        '<div class="card-back">' + card.a + '</div>' +
      '</div>';
    div.addEventListener('click', function() { this.classList.toggle('flipped'); });
    grid.appendChild(div);
  }
  counter.textContent = 'Showing ' + currentCards.length + ' of ' + cards.length + ' cards';
}

function filterCards(type) {
  if (type === 'all') {
    currentCards = cards.slice();
  } else {
    currentCards = [];
    for (var i = 0; i < cards.length; i++) {
      if (cards[i].p === type) currentCards.push(cards[i]);
    }
  }
  render();
}

function filterByTopic(topic) {
  if (topic === 'all') {
    currentCards = cards.slice();
  } else {
    currentCards = [];
    for (var i = 0; i < cards.length; i++) {
      if (cards[i].t === topic) currentCards.push(cards[i]);
    }
  }
  render();
}

function shuffleCards() {
  for (var i = currentCards.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = currentCards[i];
    currentCards[i] = currentCards[j];
    currentCards[j] = temp;
  }
  render();
}

render();
</script>
</body>
</html>
