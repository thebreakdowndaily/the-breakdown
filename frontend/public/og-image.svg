<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#111122"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(212,168,67,0.06)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(212,168,67,0.06)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(212,168,67,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(212,168,67,0.04)" stroke-width="1"/>
  <!-- Diamond accent -->
  <polygon points="600,60 680,100 600,140 520,100" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <!-- Brand name -->
  <text x="600" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="80" fill="#FFFFFF" text-anchor="middle" letter-spacing="4" font-weight="bold">THE BREAKDOWN</text>
  <!-- Tagline -->
  <text x="600" y="330" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="rgba(212,168,67,0.7)" text-anchor="middle" letter-spacing="6" font-weight="normal">INDIA'S VISUAL INTELLIGENCE PLATFORM</text>
  <!-- Divider -->
  <line x1="450" y1="370" x2="750" y2="370" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
  <!-- Subtitle -->
  <text x="600" y="420" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2" font-weight="normal">Intelligence Reports • Data Lab • The Fix • Accountability</text>
  <!-- Bottom gradient bar -->
  <rect x="0" y="600" width="1200" height="30" fill="url(#accent)" opacity="0.15"/>
  <!-- Corner accent -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="rgba(212,168,67,0.15)" stroke-width="1" rx="8"/>
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="rgba(212,168,67,0.06)" stroke-width="1" rx="6"/>
</svg>
